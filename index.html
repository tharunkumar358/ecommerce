<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ShopHub — Pro Clean Edition with Filters</title>

<style>
:root {
  --bg: #f4f7f9;
  --text: #1a202c;
  --card: #ffffff;
  --border: #e2e8f0;
  --accent: #f59e0b;
  --accent-dark: #d97706;
  --header: #1a202c;
  --nav-bg: #2d3748;
}

body.dark {
  --bg: #0f172a;
  --text: #f1f5f9;
  --card: #1e293b;
  --border: #334155;
  --header: #020617;
  --nav-bg: #0f172a;
}

* { margin:0; padding:0; box-sizing:border-box; font-family:Segoe UI, sans-serif; }

body { background:var(--bg); color:var(--text); overflow-x: hidden; }

/* HEADER */
header {
  background:var(--header);
  color:white;
  display:flex;
  padding:15px 5%;
  align-items:center;
  position:sticky;
  top:0;
  z-index:1000;
}

.logo { color:var(--accent); font-weight:800; font-size:22px; cursor:pointer; margin-right: 20px;}

.search { flex:1; margin:0 20px; }
.search input {
  width:100%;
  padding:10px;
  border:none;
  border-radius:5px;
  outline: none;
}

.btn {
  background:var(--accent);
  color: #fff;
  border:none;
  padding:8px 16px;
  cursor:pointer;
  font-weight:600;
  border-radius: 4px;
}
.btn:hover { background: var(--accent-dark); }

/* NAV */
nav {
  display:flex;
  gap:20px;
  padding:12px 5%;
  background:var(--nav-bg);
  overflow:auto;
}

nav div {
  color:#cbd5e1;
  cursor:pointer;
  font-weight: 500;
  text-transform: capitalize;
}

nav .active {
  color:var(--accent);
  border-bottom: 2px solid var(--accent);
}

/* LAYOUT STRUCTURE */
.container { display:flex; padding:20px 5%; gap:25px; }

/* ASIDE FILTERS */
aside {
  width: 260px;
  background: var(--card);
  padding: 20px;
  border: 1px solid var(--border);
  border-radius: 10px;
  height: fit-content;
  position: sticky;
  top: 85px;
}

aside h3 {
  margin-bottom: 15px;
  padding-bottom: 5px;
  border-bottom: 1px solid var(--border);
  font-size: 18px;
}

aside h4 {
  margin: 15px 0 8px 0;
  font-size: 14px;
  text-transform: uppercase;
  color: #64748b;
  letter-spacing: 0.5px;
}

aside label {
  display: flex;
  align-items: center;
  gap: 8px;
  margin: 8px 0;
  font-size: 14px;
  cursor: pointer;
}

.price-box input {
  width: 100%;
  accent-color: var(--accent);
  margin-top: 5px;
}
.price-val {
  font-weight: 600;
  display: inline-block;
  margin-top: 5px;
  font-size: 14px;
}

/* PRODUCTS GRID */
.products {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:20px;
  flex:1;
}

.card {
  background:var(--card);
  padding:15px;
  border:1px solid var(--border);
  border-radius:10px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

.card img {
  width:100%;
  height:160px;
  object-fit:cover;
  border-radius:8px;
  margin-bottom: 10px;
}

.card h4 {
  font-size: 15px;
  line-height: 1.3;
}

.rating-stars {
  color: #ffb100;
  font-size: 13px;
  margin-top: 4px;
}

.price { font-weight:700; margin:10px 0; font-size: 16px; }

/* CART */
.cart {
  position:fixed;
  right:0;
  top:0;
  width:340px;
  height:100%;
  background:var(--card);
  border-left:1px solid var(--border);
  transform:translateX(100%);
  transition: transform 0.3s ease-in-out;
  padding:20px;
  z-index: 2000;
  box-shadow: -4px 0 15px rgba(0,0,0,0.1);
  display: flex;
  flex-direction: column;
}

.cart.open { transform:translateX(0); }

.cart-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 15px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
}

.cart-items-wrapper {
  flex: 1;
  overflow-y: auto;
}

.item {
  display:flex;
  justify-content:space-between;
  align-items: center;
  padding:12px 0;
  border-bottom:1px solid var(--border);
  font-size: 14px;
}

.remove-btn {
  background: transparent;
  border: none;
  color: #ef4444;
  font-size: 18px;
  cursor: pointer;
  padding: 0 5px;
}

.cart-footer {
  padding-top: 15px;
  border-top: 1px solid var(--border);
  margin-top: auto;
}

/* RESPONSIVE LAYOUT */
@media (max-width: 768px) {
  .container { flex-direction: column; }
  aside { width: 100%; position: static; }
}
</style>
</head>

<body>

<header>
  <div class="logo" onclick="reset()">ShopHub</div>

  <div class="search">
    <input id="search" oninput="render()" placeholder="Search products...">
  </div>

  <button class="btn" onclick="toggleCart()">Cart (<span id="count">0</span>)</button>
</header>

<nav id="nav"></nav>

<div class="container">
  <aside>
    <h3>Filters</h3>

    <h4>Max Budget</h4>
    <div class="price-box">
      <input type="range" min="500" max="100000" step="500" value="100000" id="priceRange" oninput="updatePrice(this.value)"/>
      <span class="price-val" id="priceVal">₹1,00,000</span>
    </div>

    <h4>Customer Reviews</h4>
    <label><input type="radio" name="r" onclick="setRate(0)" checked> All Reviews</label>
    <label><input type="radio" name="r" onclick="setRate(4)"> ⭐⭐⭐⭐ & up</label>
    <label><input type="radio" name="r" onclick="setRate(3)"> ⭐⭐⭐ & up</label>
    <label><input type="radio" name="r" onclick="setRate(2)"> ⭐⭐ & up</label>
    
    <button class="btn" style="width: 100%; margin-top: 15px; background: transparent; border: 1px solid var(--border); color: var(--text);" onclick="reset()">Clear All</button>
  </aside>

  <div class="products" id="box"></div>
</div>

<div class="cart" id="cart">
  <div class="cart-header">
    <h3>Shopping Cart</h3>
    <button onclick="toggleCart()" style="background:none; border:none; font-size:20px; cursor:pointer; color:var(--text);">&times;</button>
  </div>
  <div class="cart-items-wrapper" id="cartItems"></div>
  <div class="cart-footer">
    <b id="cartTotal">Total: ₹0</b>
  </div>
</div>

<script>
const baseProducts = [ 
  {name:"iPhone 14 Pro", cat:"electronics", img:"https://encrypted-tbn0.gstatic.com/shopping?q=tbn:ANd9GcQye6Bon11E3SyXZIDmyvGJE4mzXl12h_woPlvRWkduJHSeYsU7JHht4A8SwZbphxFeGeuhGSI8dpY5icAoheezZsgzdor_2GbWmDw2wHbTC1pncAou1RM26eQ7ZCam6uRPvuNrsss&usqp=CAc", price:79999},
  {name:"Victus Gaming Laptop", cat:"electronics", img:"https://5.imimg.com/data5/SELLER/Default/2023/5/308883942/JZ/KX/VP/3246301/hp-fa0165tx-victus-gaming-laptop-500x500.jpg", price:92000}, 
  {name:"Sony Headphones", cat:"electronics", img:"https://images.unsplash.com/photo-1505740420928-5e560c06d30e", price:24999}, 
  {name:"Leather Chelsea Boots", cat:"fashion", img:"https://images.unsplash.com/photo-1549298916-b41d501d3772", price:5499}, 
  {name:"Lee Cooper T-Shirt", cat:"fashion", img:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT-_yme9viaQnZHiKCHQ9RzMmrWLhhPHTNlxg&s", price:2000}, 
  {name:"Ergonomic Office Chair", cat:"home", img:"https://images.unsplash.com/photo-1567538096630-e0c55bd6374c", price:14500}, 
  {name:"Football Match Ball", cat:"sports", img:"https://upload.wikimedia.org/wikipedia/commons/1/1d/Football_Pallo_valmiina-cropped.jpg", price:800}, 
  {name:"English Willow Cricket Bat", cat:"sports", img:"https://m.media-amazon.com/images/I/41Jc7itifML._AC_UF894,1000_QL80_.jpg", price:3000}, 
  {name:"Adjustable Dumbbells Set", cat:"sports", img:"https://images.unsplash.com/photo-1517836357463-d25dfeac3438", price:12000}, 
  {name:"Yonex Nylon Shuttlecock", cat:"sports", img:"https://m.media-amazon.com/images/I/71X2du5Z-oL._AC_UF894,1000_QL80_.jpg", price:2500}, 
  {name:"Speed Rubics Cube", cat:"sports", img:"https://cdn.prod.website-files.com/6595ca03bcd68f311fd41872/674f17102f24ec777d2ab5ea_product__CUBERS-BLACKPANTHER_scramble.jpg", price:2500}, 
  {name:"Premium Non-Slip Yoga Mat", cat:"sports", img:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR9iYhEeCIJpBA6SS3oc6twtu5u6kQAEVMdgw&s", price:1500} 
];

// Structural arrangement to map clean, dynamic IDs and localized ratings (2 to 5 stars)
const products = baseProducts.map((p, index) => ({
  id: index + 1,
  ...p,
  rating: Math.floor(Math.random() * 4) + 2
}));

let cat = "all";
let maxPrice = 100000;
let minRate = 0;
let cart = {}; 

function renderNav(){
  const cats = ["all","electronics","fashion","home","sports"];
  document.getElementById("nav").innerHTML =
    cats.map(c => `<div onclick="setCat('${c}')" class="${cat===c?'active':''}">${c.toUpperCase()}</div>`).join("");
}

function render(){
  const q = document.getElementById("search").value.toLowerCase().trim();

  // Combined concurrent evaluation logic for structural filters
  const filtered = products.filter(p =>
    (cat === "all" || p.cat === cat) &&
    p.price <= maxPrice &&
    p.rating >= minRate &&
    p.name.toLowerCase().includes(q)
  );

  if(filtered.length === 0) {
    document.getElementById("box").innerHTML = `
      <div style="grid-column: 1/-1; text-align: center; padding: 40px; color: #64748b;">
        <strong>No products match your custom filter choices.</strong>
      </div>`;
    return;
  }

  document.getElementById("box").innerHTML = filtered.map(p => {
    let stars = "★".repeat(p.rating) + "☆".repeat(5 - p.rating);
    return `
      <div class="card">
        <div>
          <img src="${p.img}" alt="${p.name}">
          <h4>${p.name}</h4>
          <div class="rating-stars" title="${p.rating} out of 5 stars">${stars}</div>
        </div>
        <div>
          <div class="price">₹${p.price.toLocaleString('en-IN')}</div>
          <button class="btn" style="width: 100%;" onclick="add(${p.id})">Add to Cart</button>
        </div>
      </div>
    `;
  }).join("");
}

function setCat(c){
  cat = c;
  renderNav();
  render();
}

function updatePrice(val) {
  maxPrice = Number(val);
  document.getElementById("priceVal").innerText = `₹${maxPrice.toLocaleString('en-IN')}`;
  render();
}

function setRate(r) {
  minRate = r;
  render();
}

function add(id){
  cart[id] = (cart[id] || 0) + 1;
  updateCart();
  document.getElementById("cart").classList.add("open");
}

function updateCart(){
  let total = 0;
  let count = 0;
  const itemsContainer = document.getElementById("cartItems");
  const activeIds = Object.keys(cart).filter(id => cart[id] > 0);

  if(activeIds.length === 0) {
    itemsContainer.innerHTML = `<div style="text-align: center; color: #64748b; padding: 20px 0;">Your cart is empty</div>`;
    document.getElementById("cartTotal").innerText = "Total: ₹0";
    document.getElementById("count").innerText = 0;
    return;
  }

  itemsContainer.innerHTML = activeIds.map(id => {
    const p = products.find(x => x.id == id);
    const qty = cart[id];
    total += p.price * qty;
    count += qty;

    return `
      <div class="item">
        <div>
          <strong>${p.name}</strong><br>
          <span style="color:#64748b;">₹${p.price.toLocaleString('en-IN')} &times; ${qty}</span>
        </div>
        <button class="remove-btn" onclick="remove(${id})">&times;</button>
      </div>
    `;
  }).join("");

  document.getElementById("cartTotal").innerText = `Total: ₹${total.toLocaleString('en-IN')}`;
  document.getElementById("count").innerText = count;
}

function remove(id){
  delete cart[id];
  updateCart();
}

function toggleCart(){
  document.getElementById("cart").classList.toggle("open");
}

function reset(){
  cat = "all";
  maxPrice = 100000;
  minRate = 0;
  document.getElementById("search").value = "";
  document.getElementById("priceRange").value = 100000;
  document.getElementById("priceVal").innerText = "₹1,00,000";
  
  // Reset star filter input button visually
  document.querySelector("input[name='r'][value='0']").checked = true;
  
  renderNav();
  render();
}

// Initial script deployment sequence execution context
renderNav();
render();
updateCart();
</script>

</body>
</html>
